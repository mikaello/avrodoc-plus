name: Build and test project 🔧💉

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - name: Run the tests 👀
      run: npm run test:ci
